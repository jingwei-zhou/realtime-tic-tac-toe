<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky: deep pre-dawn blue up top fading down through pink and orange to a
         bright gold at the horizon. -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#16224e"/>
      <stop offset="30%" stop-color="#4b3a72"/>
      <stop offset="52%" stop-color="#b85a73"/>
      <stop offset="72%" stop-color="#ff9256"/>
      <stop offset="90%" stop-color="#ffd07f"/>
      <stop offset="100%" stop-color="#ffe9b0"/>
    </linearGradient>

    <!-- Soft glow around the sun. -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff4d1" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffd982" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb85c" stop-opacity="0"/>
    </radialGradient>

    <!-- Sea: warm reflected light at the horizon deepening to night-blue below. -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffcf8a"/>
      <stop offset="14%" stop-color="#e78a55"/>
      <stop offset="45%" stop-color="#3a6489"/>
      <stop offset="100%" stop-color="#122238"/>
    </linearGradient>

    <!-- Vertical shimmer of the sun's reflection on the water. -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff2c8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff2c8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="1200" height="470" fill="url(#sky)"/>

  <!-- Sun glow + disc, sitting on the horizon -->
  <circle cx="600" cy="470" r="240" fill="url(#glow)"/>
  <circle cx="600" cy="452" r="82" fill="#fff5d6"/>

  <!-- Sea -->
  <rect x="0" y="470" width="1200" height="330" fill="url(#sea)"/>

  <!-- Sun reflection: a soft shimmer column widening toward the viewer -->
  <path d="M600 470 L664 800 L536 800 Z" fill="url(#shimmer)"/>

  <!-- A few broken highlights on the water for texture -->
  <g fill="#fff2c8" opacity="0.5">
    <ellipse cx="600" cy="512" rx="70" ry="4"/>
    <ellipse cx="600" cy="548" rx="92" ry="4"/>
    <ellipse cx="600" cy="590" rx="120" ry="5"/>
    <ellipse cx="600" cy="642" rx="150" ry="5"/>
    <ellipse cx="600" cy="704" rx="186" ry="6"/>
  </g>
</svg>
