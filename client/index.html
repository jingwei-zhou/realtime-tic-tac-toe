<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <h1>Tic-Tac-Toe</h1>
    <p class="subtitle">5×5 board — get 3 in a row to win</p>

    <button id="find" class="btn">Find Game</button>
    <p id="status" class="status">Click Find Game to start</p>
    <div id="spinner" class="spinner" hidden aria-hidden="true"></div>

    <div id="board" class="board" aria-label="game board"></div>

    <button id="rematch" class="btn" hidden>Play Again</button>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
